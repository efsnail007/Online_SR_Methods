<svg width="1800" height="900" viewBox="0 0 1800 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pageBg" x1="80" y1="40" x2="1720" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FAFC"/>
      <stop offset="0.46" stop-color="#F4F7FB"/>
      <stop offset="1" stop-color="#E8EEF7"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#CBD5E1" stroke-opacity="0.32" stroke-width="1"/>
    </pattern>
    <linearGradient id="browserFill" x1="72" y1="210" x2="480" y2="470" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F1F6FD"/>
    </linearGradient>
    <linearGradient id="frontendFill" x1="510" y1="210" x2="870" y2="470" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF2C9"/>
      <stop offset="1" stop-color="#FFD88F"/>
    </linearGradient>
    <linearGradient id="httpFill" x1="900" y1="210" x2="1260" y2="470" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E6F7EC"/>
      <stop offset="1" stop-color="#C7EAD2"/>
    </linearGradient>
    <linearGradient id="backendFill" x1="1290" y1="210" x2="1730" y2="470" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8ECFF"/>
      <stop offset="1" stop-color="#D5DDFF"/>
    </linearGradient>
    <linearGradient id="mlFill" x1="1290" y1="570" x2="1730" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFE7DC"/>
      <stop offset="1" stop-color="#FFCBB7"/>
    </linearGradient>
    <linearGradient id="returnFill" x1="72" y1="570" x2="870" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6F8FB"/>
      <stop offset="1" stop-color="#E8EEF5"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-12%" width="120%" height="132%" filterUnits="objectBoundingBox" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1E293B" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 0L14 7L0 14V0Z" fill="#334155"/>
    </marker>
    <marker id="arrowSoft" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 0L14 7L0 14V0Z" fill="#64748B"/>
    </marker>
    <style>
      .title { font: 700 46px Arial, Helvetica, "DejaVu Sans", sans-serif; fill: #172033; }
      .subtitle { font: 400 18px Arial, Helvetica, "DejaVu Sans", sans-serif; fill: #475569; }
      .chip { font: 700 13px Arial, Helvetica, "DejaVu Sans", sans-serif; letter-spacing: 0.04em; text-transform: uppercase; fill: #334155; }
      .cardTitle { font: 700 27px Arial, Helvetica, "DejaVu Sans", sans-serif; fill: #172033; }
      .cardSub { font: 700 15px Arial, Helvetica, "DejaVu Sans", sans-serif; fill: #475569; }
      .body { font: 400 16px Arial, Helvetica, "DejaVu Sans", sans-serif; fill: #243244; }
      .small { font: 400 14px Arial, Helvetica, "DejaVu Sans", sans-serif; fill: #516075; }
      .label { font: 700 13px Arial, Helvetica, "DejaVu Sans", sans-serif; fill: #334155; }
      .number { font: 700 18px Arial, Helvetica, "DejaVu Sans", sans-serif; fill: #FFFFFF; }
      .mono { font: 700 14px Arial, Helvetica, "DejaVu Sans", sans-serif; fill: #27364A; }
      .note { font: 400 15px Arial, Helvetica, "DejaVu Sans", sans-serif; fill: #516075; }
    </style>
  </defs>

  <rect width="1800" height="900" rx="36" fill="url(#pageBg)"/>
  <rect x="36" y="36" width="1728" height="828" rx="28" fill="url(#grid)"/>

  <text x="70" y="92" class="title">Сценарий обработки одного кадра</text>
  <text x="70" y="128" class="subtitle">Один кадр с камеры проходит через canvas, HTTP-запрос, FastAPI-сервис, выбранный runtime и возвращается в интерфейс как JPEG/PNG с метриками.</text>

  <rect x="70" y="154" width="1660" height="54" rx="18" fill="#FFFFFF" fill-opacity="0.74" stroke="#DDE5EF"/>
  <text x="96" y="188" class="note">Ключевой принцип: следующий кадр отправляется только после завершения текущего запроса, поэтому 1 обработанный кадр соответствует 1 циклу POST /api/v1/upscale.</text>

  <g filter="url(#shadow)">
    <rect x="72" y="240" width="408" height="250" rx="24" fill="url(#browserFill)" stroke="#D8E1EC" stroke-width="2"/>
    <circle cx="106" cy="274" r="19" fill="#334155"/>
    <text x="100" y="280" class="number">1</text>
    <rect x="134" y="258" width="108" height="30" rx="15" fill="#E8F1FF"/>
    <text x="160" y="278" class="chip">Камера</text>
    <text x="98" y="334" class="cardTitle">Захват кадра</text>
    <text x="98" y="364" class="cardSub">navigator.mediaDevices.getUserMedia</text>
    <text x="98" y="406" class="body">- браузер получает поток веб-камеры</text>
    <text x="98" y="436" class="body">- video держит исходный кадр</text>
    <text x="98" y="466" class="body">- пример камеры: 640x360</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="510" y="240" width="360" height="250" rx="24" fill="url(#frontendFill)" stroke="#E4A23A" stroke-width="2"/>
    <circle cx="544" cy="274" r="19" fill="#334155"/>
    <text x="538" y="280" class="number">2</text>
    <rect x="572" y="258" width="106" height="30" rx="15" fill="#FFF8E4"/>
    <text x="598" y="278" class="chip">Canvas</text>
    <text x="536" y="334" class="cardTitle">Рабочий размер</text>
    <text x="536" y="364" class="cardSub">drawImage(video, 0, 0, w, h)</text>
    <text x="536" y="406" class="body">- кадр уменьшается перед отправкой</text>
    <text x="536" y="436" class="body">- по умолчанию: 96x54</text>
    <text x="536" y="466" class="body">- пользователь может менять w и h</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="900" y="240" width="360" height="250" rx="24" fill="url(#httpFill)" stroke="#76B989" stroke-width="2"/>
    <circle cx="934" cy="274" r="19" fill="#334155"/>
    <text x="928" y="280" class="number">3</text>
    <rect x="962" y="258" width="132" height="30" rx="15" fill="#EFFBF2"/>
    <text x="988" y="278" class="chip">Кодирование</text>
    <text x="926" y="334" class="cardTitle">Blob кадра</text>
    <text x="926" y="364" class="cardSub">canvas.toBlob()</text>
    <text x="926" y="406" class="body">- формат: image/jpeg или image/png</text>
    <text x="926" y="436" class="body">- JPEG quality: 0.82</text>
    <text x="926" y="466" class="body">- Content-Type: octet-stream</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1290" y="240" width="440" height="250" rx="24" fill="url(#backendFill)" stroke="#99A8F3" stroke-width="2"/>
    <circle cx="1324" cy="274" r="19" fill="#334155"/>
    <text x="1318" y="280" class="number">4</text>
    <rect x="1352" y="258" width="118" height="30" rx="15" fill="#F7F8FF"/>
    <text x="1380" y="278" class="chip">Запрос</text>
    <text x="1316" y="334" class="cardTitle">POST /api/v1/upscale</text>
    <text x="1316" y="364" class="cardSub">FastAPI принимает байты изображения</text>
    <text x="1316" y="406" class="body">- query: output_format, outscale, model_id</text>
    <text x="1316" y="436" class="body">- тяжелая работа вынесена в threadpool</text>
    <text x="1316" y="466" class="body">- ошибки возвращаются как HTTP 400 или 503</text>
  </g>

  <path d="M480 365H510" stroke="#334155" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M870 365H900" stroke="#334155" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1260 365H1290" stroke="#334155" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="1290" y="580" width="440" height="250" rx="24" fill="url(#mlFill)" stroke="#EE8960" stroke-width="2"/>
    <circle cx="1324" cy="614" r="19" fill="#334155"/>
    <text x="1318" y="620" class="number">5</text>
    <rect x="1352" y="598" width="114" height="30" rx="15" fill="#FFF4EE"/>
    <text x="1378" y="618" class="chip">Backend</text>
    <text x="1316" y="674" class="cardTitle">Декодирование и runtime</text>
    <text x="1316" y="704" class="cardSub">SuperResolutionService + ModelRegistry</text>
    <text x="1316" y="746" class="body">- OpenCV декодирует байты в BGR numpy</text>
    <text x="1316" y="776" class="body">- выбирается Real-ESRGAN, SRCNN или Bicubic</text>
    <text x="1316" y="806" class="body">- PyTorch/CPU/CUDA выполняет upscale x4</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="900" y="580" width="360" height="250" rx="24" fill="#FFFFFF" stroke="#D7DEE7" stroke-width="2"/>
    <circle cx="934" cy="614" r="19" fill="#334155"/>
    <text x="928" y="620" class="number">6</text>
    <rect x="962" y="598" width="126" height="30" rx="15" fill="#F4F7FB"/>
    <text x="988" y="618" class="chip">Ответ</text>
    <text x="926" y="674" class="cardTitle">JPEG/PNG + headers</text>
    <text x="926" y="704" class="cardSub">encode_image_bytes()</text>
    <text x="926" y="746" class="body">- тело ответа: улучшенный кадр</text>
    <text x="926" y="776" class="body">- X-Inference-Time-Ms</text>
    <text x="926" y="806" class="body">- X-Output-Width / Height</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="72" y="580" width="798" height="250" rx="24" fill="url(#returnFill)" stroke="#C4CEDA" stroke-width="2"/>
    <circle cx="106" cy="614" r="19" fill="#334155"/>
    <text x="100" y="620" class="number">7</text>
    <rect x="134" y="598" width="136" height="30" rx="15" fill="#FFFFFF"/>
    <text x="160" y="618" class="chip">Интерфейс</text>
    <text x="98" y="674" class="cardTitle">Показ результата и статистики</text>
    <text x="98" y="704" class="cardSub">URL.createObjectURL(responseBlob)</text>
    <text x="98" y="746" class="body">- обработанный кадр выводится в правую панель</text>
    <text x="98" y="776" class="body">- обновляются FPS, время инференса, полный цикл и разрешение</text>
    <text x="98" y="806" class="body">- scheduleNextFrame(0) запускает следующий кадр после ответа</text>
  </g>

  <path d="M1510 490V580" stroke="#334155" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1290 705H1260" stroke="#334155" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M900 705H870" stroke="#334155" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <path d="M416 580C416 540 416 520 416 490" stroke="#64748B" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 10" marker-end="url(#arrowSoft)"/>
  <text x="434" y="544" class="label">после ответа цикл повторяется</text>

</svg>
